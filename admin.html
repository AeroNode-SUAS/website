<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | AeroNode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Use the latest Cloudinary widget library -->
    <script src="https://widget.cloudinary.com/v2.0/global/all.js" type="text/javascript"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { 'primary': '#4f46e5', 'primary-dark': '#a5b4fc' }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        .loader { border-top-color: #4f46e5; animation: spinner 0.6s linear infinite; }
        @keyframes spinner { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-300">

    <!-- Auth Guard Overlay -->
    <div id="auth-overlay" class="fixed inset-0 z-50 flex items-center justify-center bg-gray-100 dark:bg-gray-950 px-4">
        <div class="w-full max-w-md bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-2xl">
            <h2 class="text-2xl font-bold text-center mb-6">AeroNode Admin</h2>
            <div id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Email</label>
                    <input type="email" id="login-email" class="w-full px-4 py-2 rounded-lg bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 focus:ring-2 focus:ring-primary outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Password</label>
                    <input type="password" id="login-password" class="w-full px-4 py-2 rounded-lg bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 focus:ring-2 focus:ring-primary outline-none">
                </div>
                <button id="btn-login" class="w-full py-3 bg-primary hover:bg-indigo-700 text-white font-bold rounded-lg transition duration-200">Sign In</button>
                <p id="auth-error" class="text-red-500 text-sm text-center hidden"></p>
            </div>
        </div>
    </div>

    <!-- Main Dashboard UI -->
    <div id="dashboard" class="hidden">
        <nav class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 sticky top-0 z-40">
            <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
                <span class="text-xl font-bold text-primary dark:text-primary-dark">Admin <b>Panel</b></span>
                <div class="flex items-center space-x-4">
                    <span id="user-display" class="text-sm opacity-70 hidden md:inline"></span>
                    <button id="btn-logout" class="text-sm bg-gray-100 dark:bg-gray-700 px-3 py-1.5 rounded-md hover:bg-red-50 dark:hover:bg-red-900/30 hover:text-red-600 transition">Logout</button>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-4 py-8">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                
                <!-- Left: Post Editor -->
                <div class="lg:col-span-2 space-y-6">
                    <div class="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700">
                        <h3 id="editor-title" class="text-xl font-bold mb-6">Create New Post</h3>
                        <form id="post-form" class="space-y-4">
                            <input type="hidden" id="edit-id">
                            <div>
                                <label class="block text-sm font-medium mb-1">Title</label>
                                <input type="text" id="post-title" required class="w-full px-4 py-2 rounded-lg bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 outline-none">
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-sm font-medium mb-1">Author</label>
                                    <input type="text" id="post-author" class="w-full px-4 py-2 rounded-lg bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 outline-none">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium mb-1">Date</label>
                                    <input type="date" id="post-date" class="w-full px-4 py-2 rounded-lg bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 outline-none">
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-1">Image Preview</label>
                                <div id="image-container" class="relative group h-48 w-full bg-gray-100 dark:bg-gray-900 rounded-xl overflow-hidden border-2 border-dashed border-gray-300 dark:border-gray-600 flex items-center justify-center mb-2">
                                    <img id="preview-img" src="" class="absolute inset-0 w-full h-full object-cover hidden">
                                    <div id="placeholder-ui" class="text-center p-4">
                                        <button type="button" id="upload_widget_opener" class="bg-primary text-white px-4 py-2 rounded-lg text-sm mb-2 hover:bg-indigo-700 transition">Upload to Cloudinary</button>
                                        <p class="text-xs text-gray-400">Supported: JPG, PNG, WebP</p>
                                    </div>
                                    <button type="button" id="clear-img" class="absolute top-2 right-2 bg-red-500 text-white p-1 rounded-full hidden hover:scale-110 transition">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="2" stroke-linecap="round"/></svg>
                                    </button>
                                </div>
                                <input type="hidden" id="post-image-url">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-1">Excerpt (Short Summary)</label>
                                <textarea id="post-excerpt" rows="2" class="w-full px-4 py-2 rounded-lg bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 outline-none"></textarea>
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-1">Content (Markdown/HTML supported)</label>
                                <textarea id="post-content" required rows="8" class="w-full px-4 py-2 rounded-lg bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 outline-none"></textarea>
                            </div>
                            <div class="flex space-x-3">
                                <button type="submit" id="btn-save" class="flex-1 bg-primary text-white py-3 rounded-xl font-bold hover:bg-indigo-700 transition shadow-lg shadow-indigo-500/20">Publish Post</button>
                                <button type="button" id="btn-cancel" class="hidden px-6 py-3 bg-gray-200 dark:bg-gray-700 rounded-xl font-bold transition">Cancel</button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Right: Existing Posts List -->
                <div class="space-y-6">
                    <div class="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700">
                        <h3 class="text-lg font-bold mb-4">Manage Posts</h3>
                        <div id="posts-list" class="space-y-4 max-h-[70vh] overflow-y-auto pr-2">
                            <div class="flex justify-center p-8">
                                <div class="loader w-8 h-8 rounded-full border-4 border-gray-200"></div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <div id="toast" class="fixed bottom-6 right-6 px-6 py-3 rounded-xl shadow-2xl transform translate-y-20 opacity-0 transition-all duration-300 z-[100] bg-gray-900 text-white dark:bg-white dark:text-gray-900">
        <span id="toast-msg"></span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBaz7fTqeJsAqMAhJ1bKyOPHoyNOSMgQMU",
            authDomain: "aeronode-suas.firebaseapp.com",
            projectId: "aeronode-suas",
            storageBucket: "aeronode-suas.firebasestorage.app",
            messagingSenderId: "55107024885",
            appId: "1:55107024885:web:7068d2cd2efaa93992d2bc"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- UI ELEMENTS ---
        const overlay = document.getElementById('auth-overlay');
        const dashboard = document.getElementById('dashboard');
        const postForm = document.getElementById('post-form');
        const postsList = document.getElementById('posts-list');
        const toast = document.getElementById('toast');
        const toastMsg = document.getElementById('toast-msg');

        function showToast(msg, error = false) {
            toastMsg.innerText = msg;
            toast.className = `fixed bottom-6 right-6 px-6 py-3 rounded-xl shadow-2xl transform translate-y-0 opacity-100 transition-all duration-300 z-[100] ${error ? 'bg-red-500 text-white' : 'bg-green-500 text-white'}`;
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

        // --- AUTH ---
        document.getElementById('btn-login').onclick = async () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;
            const errorEl = document.getElementById('auth-error');
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (e) {
                errorEl.innerText = "Invalid credentials.";
                errorEl.classList.remove('hidden');
            }
        };

        document.getElementById('btn-logout').onclick = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                overlay.classList.add('hidden');
                dashboard.classList.remove('hidden');
                document.getElementById('user-display').innerText = user.email;
                loadPosts();
            } else {
                overlay.classList.remove('hidden');
                dashboard.classList.add('hidden');
            }
        });

        // --- CLOUDINARY WIDGET (RE-IMPLEMENTED FOR STABILITY) ---
        let cloudinaryWidget;

        function initCloudinary() {
            if (typeof cloudinary === 'undefined') {
                console.error("Cloudinary library not loaded.");
                return;
            }
            
            // Re-check your Cloudinary dashboard for these two exact strings:
            const CLOUD_NAME = 'dxiuurbuk';
            const PRESET = 'unsigned_default_preset';

            cloudinaryWidget = cloudinary.createUploadWidget({
                cloudName: CLOUD_NAME,
                uploadPreset: PRESET,
                sources: ['local', 'url', 'camera'],
                multiple: false,
                cropping: true,
                defaultSource: 'local',
                styles: {
                    palette: {
                        window: '#111827',
                        sourceBg: '#1F2937',
                        windowBorder: '#374151',
                        tabIcon: '#4F46E5',
                        inactiveTabIcon: '#9CA3AF',
                        menuIcons: '#4F46E5',
                        link: '#4F46E5',
                        action: '#4F46E5',
                        inProgress: '#4F46E5',
                        complete: '#10B981',
                        error: '#EF4444',
                        textDark: '#000000',
                        textLight: '#FFFFFF'
                    }
                }
            }, (error, result) => {
                if (error) {
                    console.error("Cloudinary Widget Error:", error);
                    showToast("Upload widget error. Check console.", true);
                }
                if (!error && result && result.event === "success") {
                    const url = result.info.secure_url;
                    document.getElementById('post-image-url').value = url;
                    document.getElementById('preview-img').src = url;
                    document.getElementById('preview-img').classList.remove('hidden');
                    document.getElementById('placeholder-ui').classList.add('hidden');
                    document.getElementById('clear-img').classList.remove('hidden');
                }
            });
        }

        // Initialize once DOM/Cloudinary script is ready
        window.addEventListener('load', initCloudinary);

        document.getElementById("upload_widget_opener").addEventListener("click", (e) => {
            e.preventDefault();
            if (cloudinaryWidget) {
                cloudinaryWidget.open();
            } else {
                initCloudinary();
                if (cloudinaryWidget) cloudinaryWidget.open();
            }
        }, false);

        document.getElementById('clear-img').onclick = () => {
            document.getElementById('post-image-url').value = '';
            document.getElementById('preview-img').src = '';
            document.getElementById('preview-img').classList.add('hidden');
            document.getElementById('placeholder-ui').classList.remove('hidden');
            document.getElementById('clear-img').classList.add('hidden');
        };

        // --- FIRESTORE ---
        postForm.onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-save');
            const id = document.getElementById('edit-id').value;
            btn.disabled = true;
            btn.innerText = "Saving...";

            const postData = {
                title: document.getElementById('post-title').value,
                author: document.getElementById('post-author').value || "AeroNode Team",
                date: document.getElementById('post-date').value || new Date().toISOString().split('T')[0],
                excerpt: document.getElementById('post-excerpt').value,
                content: document.getElementById('post-content').value,
                imageUrl: document.getElementById('post-image-url').value,
                updatedAt: serverTimestamp()
            };

            try {
                if (id) {
                    await updateDoc(doc(db, "posts", id), postData);
                    showToast("Post updated!");
                } else {
                    postData.createdAt = serverTimestamp();
                    await addDoc(collection(db, "posts"), postData);
                    showToast("Post published!");
                }
                resetForm();
            } catch (err) {
                showToast("Error saving post.", true);
            } finally {
                btn.disabled = false;
                btn.innerText = id ? "Update Post" : "Publish Post";
            }
        };

        function resetForm() {
            postForm.reset();
            document.getElementById('edit-id').value = '';
            document.getElementById('editor-title').innerText = "Create New Post";
            document.getElementById('btn-cancel').classList.add('hidden');
            document.getElementById('clear-img').click();
        }

        document.getElementById('btn-cancel').onclick = resetForm;

        function loadPosts() {
            const q = query(collection(db, "posts"), orderBy("updatedAt", "desc"));
            onSnapshot(q, (snapshot) => {
                postsList.innerHTML = '';
                if(snapshot.empty) {
                    postsList.innerHTML = '<p class="text-center opacity-50 py-8">No posts found.</p>';
                    return;
                }
                snapshot.forEach(docSnap => {
                    const post = docSnap.data();
                    const div = document.createElement('div');
                    div.className = "p-4 bg-gray-50 dark:bg-gray-900 rounded-xl border border-gray-100 dark:border-gray-800 flex justify-between items-start";
                    div.innerHTML = `
                        <div class="flex-1 min-w-0 pr-4">
                            <h4 class="font-bold truncate">${post.title}</h4>
                            <p class="text-xs opacity-50">${post.date}</p>
                        </div>
                        <div class="flex space-x-2">
                            <button onclick="editPost('${docSnap.id}')" class="p-2 hover:text-primary transition">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                            </button>
                            <button onclick="deletePost('${docSnap.id}')" class="p-2 hover:text-red-500 transition">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                            </button>
                        </div>
                    `;
                    postsList.appendChild(div);
                });
            }, (err) => {
                console.error("Firestore Listen Error:", err);
            });
        }

        window.editPost = async (id) => {
            const postRef = doc(db, "posts", id);
            onSnapshot(postRef, (snap) => {
                if(!snap.exists()) return;
                const data = snap.data();
                document.getElementById('edit-id').value = id;
                document.getElementById('post-title').value = data.title;
                document.getElementById('post-author').value = data.author;
                document.getElementById('post-date').value = data.date;
                document.getElementById('post-excerpt').value = data.excerpt || '';
                document.getElementById('post-content').value = data.content;
                
                if(data.imageUrl) {
                    document.getElementById('post-image-url').value = data.imageUrl;
                    document.getElementById('preview-img').src = data.imageUrl;
                    document.getElementById('preview-img').classList.remove('hidden');
                    document.getElementById('placeholder-ui').classList.add('hidden');
                    document.getElementById('clear-img').classList.remove('hidden');
                } else {
                    document.getElementById('clear-img').click();
                }

                document.getElementById('editor-title').innerText = "Editing Post";
                document.getElementById('btn-save').innerText = "Update Post";
                document.getElementById('btn-cancel').classList.remove('hidden');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        };

        window.deletePost = async (id) => {
            if(confirm("Delete this post?")) {
                await deleteDoc(doc(db, "posts", id));
                showToast("Post deleted.");
            }
        };

    </script>
</body>
</html>
